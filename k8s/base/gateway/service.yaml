apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    # B4: the ServiceMonitor selects the Service by this label.
    app: gateway
spec:
  selector:
    app: gateway
  type: NodePort
  ports:
    # named so the B4 ServiceMonitor can reference it by name for /metrics scraping.
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30002
      protocol: TCP
