# Public entrypoint for VidCast: an internet-facing ALB (provisioned by the AWS
# Load Balancer Controller) terminating HTTPS for vidcast.online.
#
# A single rule sends everything to the frontend. The frontend's nginx serves the
# SPA and proxies /api/ → gateway internally (stripping /api), so a separate
# /api → gateway rule isn't needed (and wouldn't work — an ALB can't strip the
# /api prefix). This keeps the gateway internal (ClusterIP).
#
# Kubecost lives on its own subdomain (k8s/ingress/kubecost-ingress.yaml), sharing
# this ALB via the same group.name. ${ACM_CERTIFICATE_ARN} is filled at deploy from
# the ACM cert for vidcast.online + *.vidcast.online — never hardcode it here.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vidcast
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: vidcast
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80,"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "${ACM_CERTIFICATE_ARN}"
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  ingressClassName: alb
  rules:
    - host: vidcast.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
  tls:
    - hosts:
        - vidcast.online
      secretName: vidcast-tls
