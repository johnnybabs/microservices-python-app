apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: database
spec:
  # I2: ClusterIP only. The datastore is reachable in-cluster (and via
  # `kubectl port-forward` for admin) but no longer has an external NodePort.
  type: ClusterIP
  ports:
    - port: 27017
  selector:
    app: database
